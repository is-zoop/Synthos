services:
  synthos-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
    container_name: synthos-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_DATA_DIR: ${APP_DATA_DIR:-/app/app_data}
      API_KEY: ${API_KEY:-replace-me-with-your-own-api-key}
    volumes:
      - ./app/app_data:/app/app_data
    restart: unless-stopped
